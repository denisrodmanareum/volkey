mode: SCALPING
seed_usd: 300
use_testnet: false
base_url: https://fapi.binance.com
universe: ALL_FUTURES
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
intervals:
  - 1m
  - 3m
  - 5m
htf_interval: 1h
risk_per_trade_pct: 0.8
daily_max_loss_pct: 6.0
max_consecutive_losses: 3
cooldown_minutes: 30
max_positions: 6
margin_mode: ISOLATED
leverage: 3
real_order: false
scan_all_symbols: true
volatile_top_n: 30
volatile_refresh_minutes: 5
volatile_min_quote_volume: 5000000
loop_sleep_sec: 3.0
global_entry_cooldown_sec: 10
fee_rate: 0.0004
order_notional_usdt: 40
breakout_lookback: 20
volume_spike_mult: 1.8
entry_min_volume_mult: 2.0
entry_min_body_ratio: 0.25
reentry_cooldown_sec: 240
max_hold_minutes: 12
enable_choch_bos_filter: true
enable_unicorn_filter: false
enable_otz_filter: false
enable_ote_filter: false
enable_qm_bonus: true
enable_execution_strength_filter: true
enable_open_interest_filter: false
enable_spoofing_filter: false
min_exec_strength_ratio: 1.05
min_entry_votes: 2
max_spread_ratio: 0.0015
spread_grace_secs: 20
max_oi_spike_ratio: 1.35
spoof_wall_ratio_threshold: 4.0
sl_pct: 0.008
tp1_pct: 0.010
tp2_pct: 0.018
trail_pct: 0.006
entry_confirm_secs: 2
max_entry_slip_pct: 0.003
max_chase_pct: 0.004
stagnation_minutes: 6.0
soft_timeout_min_profit_pct: 0.003
max_dyn_sl_mult: 1.3
min_rr_ratio: 2.0
loss_symbol_cooldown_minutes: 30
blocked_hours_kst: []
min_protect_secs: 15
early_sl_buffer_mult: 1.4
# ─── 드로다운 보호 ───
daily_max_loss_usdt: 15.0       # 일일 최대 손실 ($15 초과 시 당일 거래 중단)
drawdown_cooldown_minutes: 60   # 드로다운 발동 후 60분 쿨다운
# ─── AI Foundation Models (3-Layer Architecture) ───
ai_models:
  enabled: true
  device: auto
  models_dir: /Users/riot91naver.com/Desktop/2026/models
  # Layer 1: MOIRAI-2 multi-coin scanner
  moirai_scan_interval: 1800
  anomaly_top_n: 20
  moirai_inject_top_n: 10    # 상위 N개 후보를 진입 대상에 자동 추가
  moirai_min_anomaly: 0.20   # 이상 점수 최소 기준
  # Layer 2: Chronos-2 + PatchTST signal
  chronos_model_id: amazon/chronos-2
  min_ai_confidence: 0.55
  ai_block_mode: soft       # soft=log only, hard=block entry (AI override)
  # Layer 3: Lag-Llama risk gate
  min_risk_reward: 1.5
  min_kelly_fraction: 0.03
